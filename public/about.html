<h1>온라인 담타 소개</h1>
<p>온라인 담타는 비흡연자들을 위한 실시간 소셜 인터랙티브 공간입니다. 가상 담배, 비눗방울, 전자담배, 성냥, 양초, 모닥불 등 다양한 상호작용을 통해 전국各地的 사람들과 소통할 수 있습니다.</p>
<h2>서비스 특징</h2>
<p>• 회원가입 없이 익명으로 참여<br>
• 6가지 인터랙티브 모드 (담배, 버블, 전자담배, 성냥, 캔들, 캠프파이어)<br>
• 실시간 채팅 — 메시지가 연기처럼 캔버스에 떠오릅니다<br>
• 모바일 및 데스크탑 최적화<br>
• 완전 무료</p>
