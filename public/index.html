<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>OnlineDamta - 온라인 담타</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo">🚬 OnlineDamta</div>
    <div class="room-selector" id="room-selector">
      <button class="room-btn active" data-room="rooftop">🌙 옥상</button>
      <button class="room-btn" data-room="cafe">☕ 카페</button>
      <button class="room-btn" data-room="park">🌳 공원</button>
      <button class="room-btn" data-room="room">🛋️ 방</button>
      <button class="room-btn" data-room="beach">🌊 바닷가</button>
    </div>
    <div class="user-info">
      <span id="user-nickname"></span>
      <button id="menu-toggle" class="menu-toggle">💬</button>
    </div>
  </header>

  <div id="stats-bar">
    <span>👥 <strong id="stat-online">0</strong>명</span>
    <span>🚬 오늘 <strong id="stat-cigarettes">0</strong>개비</span>
    <span id="timer-display">⏱️ 5:00</span>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div id="interaction-hint">
        <span id="hint-text">👆 꾹 누르고 있기</span>
      </div>
      <button id="restart-btn" class="restart-btn hidden">🔄 다시하기</button>
      <div id="interaction-selector">
        <button class="interact-btn active" data-mode="cigarette">🚬</button>
        <button class="interact-btn" data-mode="bubble">🫧</button>
        <button class="interact-btn" data-mode="vape">💨</button>
        <button class="interact-btn" data-mode="match">🔥</button>
        <button class="interact-btn" data-mode="candle">🕯️</button>
        <button class="interact-btn" data-mode="campfire">🔥</button>
      </div>
    </div>

    <div id="chat-panel">
      <div class="chat-header">
        <span>💬 실시간 채팅</span>
        <button id="chat-close" class="chat-close">✕</button>
      </div>
      <div id="chat-msgs"></div>
      <div class="chat-input-wrap">
        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." maxlength="500" autocomplete="off">
        <button id="chat-send">전송</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/interactions.js"></script>
<script src="js/chat.js"></script>
<script src="js/main.js"></script>
</body>
</html>
